networks:
  korp-network:
    driver: bridge

services:
  http-server-projeto-korp:
    build:
      context: ./app
    container_name: http-server-projeto-korp
    networks:
      - korp-network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-korp
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    networks:
      - korp-network
    depends_on:
      - http-server-projeto-korp
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-korp
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - korp-network
    depends_on:
      - http-server-projeto-korp
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-korp
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - korp-network
    depends_on:
      - prometheus
    restart: unless-stopped
