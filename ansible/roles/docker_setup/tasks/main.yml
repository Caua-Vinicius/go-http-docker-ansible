---
- name: Instalar dependências do Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Criar diretório para chaves GPG
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Adicionar chave GPG oficial do Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: Adicionar repositório do Docker
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Instalar Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Garantir que o Docker está rodando
  service:
    name: docker
    state: started
    enabled: true

- name: Criar rede Docker korp-network
  community.docker.docker_network:
    name: korp-network
    driver: bridge
    state: present
